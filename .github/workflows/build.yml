name: Build and Release

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  payload-build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install build-essential clang-18 lld-18 xxd yasm nasm

    - name: Install toolchain
      run: |
        wget https://github.com/ps5-payload-dev/pacbrew-repo/releases/latest/download/ps5-payload-dev.tar.gz
        sudo tar xf ps5-payload-dev.tar.gz -C /
        wget https://github.com/ps4-payload-dev/sdk/releases/latest/download/ps4-payload-sdk.zip
        sudo unzip ps4-payload-sdk.zip -d /opt

    - name: Build Payload
      run: |
        make PS_HOST=ps4
        make clean
        make PS_HOST=ps5
        make clean

    - name: Upload PS4 Payload
      uses: actions/upload-artifact@v4
      with:
        name: ps4-nanodns.elf
        path: ps4-nanodns.elf
        if-no-files-found: error

    - name: Upload PS5 Payload
      uses: actions/upload-artifact@v4
      with:
        name: ps5-nanodns.elf
        path: ps5-nanodns.elf
        if-no-files-found: error

    - name: Upload release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with: 
        files: ps*-nanodns.elf

